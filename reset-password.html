<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Reinitialiser mot de passe</title><link rel="stylesheet" href="css/style.css"></head>
<body>
<header><nav><ul><li><a href="index.html">Accueil</a></li><li><a href="menus.html">Menus</a></li><li><a href="connexion.html">Connexion</a></li><li><a href="contact.html">Contact</a></li></ul></nav></header>
<main><section class="connexion-section"><h1>Mot de passe oublié</h1><form id="form-reset-mdp" class="connexion-form"><div class="form-group"><label for="email">Votre e-mail</label><input type="email" id="email" required></div><button type="submit" class="btn-connexion">Envoyer le lien</button></form><div id="reset-mdp-confirm" class="connexion-message" style="display:none;">Un lien de réinitialisation a été envoyé (simulation).</div><form id="form-reset-confirm" class="connexion-form" style="margin-top:1rem;"><div class="form-group"><label for="reset-token">Token de réinitialisation</label><input id="reset-token" required></div><div class="form-group"><label for="new-password">Nouveau mot de passe</label><input type="password" id="new-password" required minlength="10"></div><button type="submit" class="btn-connexion">Valider le nouveau mot de passe</button></form></section></main>
<footer><section><ul><li>Lundi : 8h-20h</li><li>Mardi : 8h-20h</li><li>Mercredi : 8h-20h</li><li>Jeudi : 8h-20h</li><li>Vendredi : 8h-20h</li><li>Samedi : 8h-20h</li><li>Dimanche : 8h-20h</li></ul></section><nav><a href="mentions-legales.html">Mentions légales</a> | <a href="cgv.html">CGV</a></nav></footer>
